name: iot_controller
description: IoT Device Controller App - Control lights and fans via MQTT
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ✅ MQTT client cho Flutter (chạy Android/iOS/Windows)
  mqtt_client: ^10.11.1


  # ✅ State management (tùy chọn)
  provider: ^6.1.1

  # ✅ Giao diện đẹp hơn (iOS style icon)
  cupertino_icons: ^1.0.6
  
  # ✅ HTTP client tương thích Android (không phụ thuộc web package)
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ✅ Linter version mới nhất, tránh cảnh báo cũ
  flutter_lints: ^3.0.2

dependency_overrides:
  web: 1.0.0

flutter:
  uses-material-design: true

  # (Tùy chọn) Thêm assets nếu bạn có hình ảnh
  # assets:
  #   - assets/images/

  # (Tùy chọn) Thêm font chữ nếu có
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
